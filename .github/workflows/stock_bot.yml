name: Stock Bot — Daily Run

on:
  schedule:
    - cron: '30 2 * * 1-5'  # 8:00 AM IST = 2:30 AM UTC, weekdays only
  workflow_dispatch:          # Also allows manual trigger from GitHub

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          pip install fyers-apiv3 pyotp requests pandas numpy \
                      python-dotenv ta

      - name: Run bot
        env:
          FYERS_APP_ID:      ${{ secrets.FYERS_APP_ID }}
          FYERS_SECRET_KEY:  ${{ secrets.FYERS_SECRET_KEY }}
          FYERS_CLIENT_ID:   ${{ secrets.FYERS_CLIENT_ID }}
          FYERS_PIN:         ${{ secrets.FYERS_PIN }}
          FYERS_TOTP_SECRET: ${{ secrets.FYERS_TOTP_SECRET }}
          TELEGRAM_TOKEN:    ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID:  ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python main.py